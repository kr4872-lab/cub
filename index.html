<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Закрой Коробку</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #game-box { display: none; }
    #cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .player-card { border: 2px solid #ccc; border-radius: 8px; padding: 10px; min-width: 160px; }
    .player-card.active { border-color: #e67e22; background: #fff8f0; }
    .tile { display: inline-block; width: 30px; height: 30px; line-height: 30px; margin: 3px; border-radius: 4px; font-weight: bold; }
    .active-tile { background: #3498db; color: white; }
    .removed-tile { background: #ecf0f1; color: #bdc3c7; text-decoration: line-through; }
    button { margin: 5px; padding: 8px 16px; font-size: 16px; cursor: pointer; border-radius: 6px; border: 2px solid #999; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status-msg { margin: 10px 0; font-size: 18px; min-height: 24px; }
    #turn-label { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>

<div id="number-of-players">
  <h1>игра</h1>
  <label for="pCount">Количество игроков</label>
  <input type="number" id="pCount" value="2" min="1" max="6">
  <button id="startBtn">Начать</button>
</div>

<div id="game-box">
  <div id="turn-label"></div>
  <div class="controls">
    <div id="status-msg"></div>
    <div class="dice-buttons">
      <button id="first">—</button>
      <button id="second">—</button>
    </div>
  </div>
  <div id="cards"></div>
</div>

<script src="classes.js"></script>
<script src="main.js"></script>
</body>
</html>
